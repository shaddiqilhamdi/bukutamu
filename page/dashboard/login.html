<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Buku Tamu - Login</title>
    <link rel="icon" href="img/icons/Logo_pln.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" 
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" 
          crossorigin="anonymous">

    <!-- Bootstrap Icons CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


</head>
<body>

    <!----------------------- Main Container -------------------------->

     <div class="container d-flex justify-content-center align-items-center min-vh-100">

    <!----------------------- Login Container -------------------------->

       <div class="row border rounded-5 p-3 bg-white shadow box-area">

    <!--------------------------- Left Box ----------------------------->

       <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box" style="background: linear-gradient(90deg, #14A2B8,#1291A6,#0A5D6F);">
           <div class="featured-image mb-3">
            <img src="img/icons/login_icon.png" class="img-fluid" style="width: 250px;">
           </div>
           <p class="text-white fs-2" style="font-family: 'Courier New', Courier, monospace; font-weight: 600;">Buku Tamu</p>
           <small class="text-white text-wrap text-center" style="width: 17rem;font-family: 'Courier New', Courier, monospace;">PLN UID Jakarta Raya</small>
       </div> 

    <!-------------------- ------ Right Box ---------------------------->
        
       <div class="col-md-6 right-box">
          <div class="row align-items-center">
                <div class="header-text mb-4">
                     <h2>Hello,Again</h2>
                     <p>We are happy to have you back.</p>
                </div>
                <div class="input-group mb-3">
                    <input id="username" type="text" class="form-control form-control-lg bg-light fs-6" placeholder="Username">
                </div>
                <div class="input-group mb-1">  
                    <input id="password" type="password" class="form-control form-control-lg bg-light fs-6" placeholder="Password">
                </div>
                <div class="input-group mb-5 d-flex justify-content-between">
                    <div class="form-check" >
                        <input type="checkbox" class="form-check-input" id="formCheck">
                        <label for="formCheck" class="form-check-label text-secondary"><small>Remember Me</small></label>
                    </div>
                    <div class="forgot">
                        <small><a href="#" style="color: #1291A6  ;" >Forgot Password?</a></small>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <button class="btn btn-lg btn-primary w-100 fs-6" id="btn-login"
                            style="background: linear-gradient(90deg, #14A2B8,#1291A6,#0A5D6F);">Login</button>
                </div>
            
          </div>
       </div> 

      </div>
    </div>

        <!-- jQuery (opsional jika diperlukan) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" 
            integrity="sha256-KyZXEAg3QhqLMpG8r+Knujsl5/1hbGG4g6l2qG6PAIc=" 
            crossorigin="anonymous"></script>

    <!-- Bootstrap Bundle JS (termasuk Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-wEmeIV1mKuiNp2RjK6GZkZ2lw5iY3tLrZ+7Y3s7j0lJFoibgE5B4AwZmDyRgfvw" 
            crossorigin="anonymous"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Feather Icons (opsional jika menggunakan ikon Feather) -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        // Inisialisasi Feather Icons (jika digunakan)
        feather.replace();
    </script>

    <!-- Custom Scripts (Tempatkan script JS Anda di sini) -->
    <script src="js/app.js"></script>
    <script src="js/guestForm.js"></script>

    <!-- Optional: Inline Script untuk Event Listener -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            console.log('Halaman telah dimuat.');

            // Tambahkan event listener lainnya di sini
        });
    </script>
</body>
</html>
